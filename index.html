<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="dashboard">
    <section id="board" class="board" aria-label="Budget board"></section>

    <section class="transactions" aria-label="Expense transactions">
      <article class="entry-card">
        <div class="page-actions">
          <a class="nav-link" href="manage.html">Manage Categories & Sections</a>
        </div>

        <h1>Expense Transactions</h1>

        <form id="entryForm" class="entry-form">
          <input id="date" name="date" type="date" required>
          <select id="entryType" name="entryType" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
          <select id="category" name="category" required></select>
          <input id="description" name="description" type="text" placeholder="Description" required>
          <input id="amount" name="amount" type="number" step="0.01" min="0.01" placeholder="Amount" required>
          <select id="paymentMethod" name="paymentMethod" required>
            <option value="Card">Card</option>
            <option value="Cash">Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
          </select>
          <button type="submit">Add</button>
        </form>
      </article>

      <article class="sheet exchange-sheet">
        <header>
          MONOBANK EXCHANGE
          <button id="refreshRatesBtn" type="button">Refresh</button>
        </header>
        <div class="exchange-status" id="exchangeStatus">Loading exchange rates...</div>
        <table>
          <thead>
            <tr>
              <th>Pair</th>
              <th>Buy</th>
              <th>Sell</th>
              <th>Cross</th>
            </tr>
          </thead>
          <tbody id="exchangeBody"></tbody>
        </table>
      </article>

      <article class="sheet transactions-sheet">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Payment Method</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="transactionsBody"></tbody>
        </table>
      </article>

      <article class="entry-card month-nav-card">
        <div class="month-nav-head">
          <h2>Month Navigation</h2>
          <select id="yearSelect" aria-label="Select year"></select>
        </div>
        <div id="monthButtons" class="month-buttons"></div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
